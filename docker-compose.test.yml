services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./test/integration/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 2 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  wiremock:
    image: wiremock/wiremock:4.0.0-beta.29
    ports:
      - "8082:8080"
    volumes:
      - ./test/integration/wiremock:/home/wiremock:ro
    command: ["--verbose"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  winet2mqtt:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mosquitto:
        condition: service_healthy
      wiremock:
        condition: service_healthy
    environment:
      WINET2MQTT_WINET_HOST: "wiremock:8080"
      WINET2MQTT_MQTT_URL: "tcp://mosquitto:1883"
      WINET2MQTT_POLL_INTERVAL: "5"
      WINET2MQTT_HEALTH_PORT: "8081"
    ports:
      - "8081:8081"
